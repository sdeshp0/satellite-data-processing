name: satellite-data-processing
channels:
  - conda-forge
  - defaults

dependencies:
  # Core Python
  - python=3.11

  # Scientific stack
  - numpy
  - xarray
  - rasterio
  - rioxarray
  - shapely
  - matplotlib
  - pillow

  # Planetary Computer + STAC
  - pystac-client
  - planetary-computer

  # Streamlit + Folium-based maps
  - streamlit
  - leafmap

  # Jupyter (optional but useful)
  - jupyterlab
  - ipykernel

  # pip section
  - pip
  - pip:
      - geopy
      - pyproj